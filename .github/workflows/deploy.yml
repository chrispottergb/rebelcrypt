name: Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: api

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Check for cluster credentials
        id: guard
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "$KUBE_CONFIG_STAGING" ]; then
            echo "::notice::KUBE_CONFIG_STAGING secret is not set — skipping staging deploy. Add a base64-encoded kubeconfig as a repo secret to enable Kubernetes deploys."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'

      - name: Install kubectl
        if: steps.guard.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl and deploy
        if: steps.guard.outputs.enabled == 'true'
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          echo "$KUBE_CONFIG_STAGING" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          kubectl set image deployment/api api=ghcr.io/${{ github.repository }}/api:sha-${GITHUB_SHA::7} -n music-ai-platform-staging
          kubectl rollout status deployment/api -n music-ai-platform-staging --timeout=5m

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Check for cluster credentials
        id: guard
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          if [ -z "$KUBE_CONFIG_PROD" ]; then
            echo "::notice::KUBE_CONFIG_PROD secret is not set — skipping production deploy. Add a base64-encoded kubeconfig as a repo secret to enable Kubernetes deploys."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'

      - name: Install kubectl
        if: steps.guard.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl and deploy
        if: steps.guard.outputs.enabled == 'true'
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          echo "$KUBE_CONFIG_PROD" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          kubectl set image deployment/api api=ghcr.io/${{ github.repository }}/api:${GITHUB_REF#refs/tags/} -n music-ai-platform
          kubectl rollout status deployment/api -n music-ai-platform --timeout=10m
